name: CI/CD Pipeline with Monitoring

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:  # Manual trigger dari GitHub UI

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_BACKEND: ${{ github.repository }}/backend
  IMAGE_NAME_FRONTEND: ${{ github.repository }}/frontend

jobs:
  # JOB 1: Lint & Test
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Go mod download
        run: |
          cd backend
          go mod download
      
      - name: Go vet
        run: |
          cd backend
          go vet ./...
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install
      
      - name: Run tests
        run: |
          cd backend
          go test -v ./... 2>/dev/null || echo "No tests implemented yet"
      
      - name: Send test notification to Telegram
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ✅ CI Pipeline - Lint & Test PASSED
            📦 Repository: ${{ github.repository }}
            🌿 Branch: ${{ github.ref_name }}
            👤 Author: ${{ github.actor }}
            🕐 Time: ${{ github.event.head_commit.timestamp }}
  
  # JOB 2: Build & Push Images
  build-and-push:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}:${{ github.sha }}
      
      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}:${{ github.sha }}
      
      - name: Send success notification
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            🚀 Build & Push SUCCESSFUL!
            📦 Backend: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}:latest
            📦 Frontend: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}:latest
            🔗 Images pushed to GitHub Container Registry
  
  # JOB 3: Deploy Instructions
  deploy-instructions:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Show deploy instructions
        run: |
          echo "=============================================="
          echo "✅ CI/CD Pipeline Completed Successfully!"
          echo "=============================================="
          echo ""
          echo "📦 Images are available at:"
          echo "   Backend: ghcr.io/${{ github.repository }}/backend:latest"
          echo "   Frontend: ghcr.io/${{ github.repository }}/frontend:latest"
          echo ""
          echo "🚀 To deploy to your Local Docker Desktop:"
          echo "   1. docker login ghcr.io -u ${{ github.actor }}"
          echo "   2. docker compose pull"
          echo "   3. docker compose up -d"
          echo ""
      
      - name: Send final notification
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ✅ CI/CD Pipeline COMPLETED!
            
            📊 Status: All jobs passed
            📦 New images pushed to registry
            🎯 Ready for deployment
            
            Deploy with:
            docker login ghcr.io -u ${{ github.actor }}
            docker compose pull
            docker compose up -d
