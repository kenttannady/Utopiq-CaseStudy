name: CI/CD Pipeline with Monitoring

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Download dependencies
        run: |
          cd backend
          go mod download
      
      - name: Run go vet
        run: |
          cd backend
          go vet ./...
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install
      
      - name: Send Telegram notification
        if: success()
        uses: appleboy/telegram-action@v1.0.0
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ✅ Lint & Test PASSED
            Repo: ${{ github.repository }}

  build-and-push:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Convert repository name to lowercase
        id: vars
        run: |
          REPO_LC=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "repo_lc=${REPO_LC}" >> $GITHUB_OUTPUT
          echo "Repository in lowercase: ${REPO_LC}"
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.repo_lc }}/backend:latest
            ghcr.io/${{ steps.vars.outputs.repo_lc }}/backend:${{ github.sha }}
      
      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.repo_lc }}/frontend:latest
            ghcr.io/${{ steps.vars.outputs.repo_lc }}/frontend:${{ github.sha }}
      
      - name: Send success notification
        if: success()
        uses: appleboy/telegram-action@v1.0.0
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            🚀 Build & Push SUCCESSFUL!
            Images pushed to ghcr.io/${{ steps.vars.outputs.repo_lc }}
